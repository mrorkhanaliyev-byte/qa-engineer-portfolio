name: Accessibility

on:
  push:
    branches: [main]
    paths:
      - '06-playwright-tests/tests/accessibility/**'
      - '06-playwright-tests/pages/helpers/AccessibilityAuditor.ts'
      - '06-playwright-tests/package.json'
      - '.github/workflows/accessibility.yml'
  pull_request:
    branches: [main]
    paths:
      - '06-playwright-tests/tests/accessibility/**'
      - '06-playwright-tests/pages/helpers/AccessibilityAuditor.ts'
      - '06-playwright-tests/package.json'
      - '.github/workflows/accessibility.yml'
  workflow_dispatch:

# A11y rules are browser-engine-independent (they read the rendered
# DOM, not pixels), so a single Chromium run is enough. No matrix.
jobs:
  a11y:
    name: WCAG 2.1 AA audit (axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: 06-playwright-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 06-playwright-tests/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run accessibility audit
        run: npm run test:a11y

      - name: Upload findings JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-findings
          path: 06-playwright-tests/playwright-report/a11y-findings-*.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-html-report
          path: 06-playwright-tests/playwright-report
          if-no-files-found: ignore
          retention-days: 14
