name: Cypress E2E

on:
  push:
    branches: [main]
    paths:
      - '05-cypress-tests/**'
      - '.github/workflows/cypress.yml'
  pull_request:
    branches: [main]
    paths:
      - '05-cypress-tests/**'
      - '.github/workflows/cypress.yml'
  workflow_dispatch:

jobs:
  cypress-run:
    name: Cypress on ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome]
        # Add 'firefox' / 'edge' here when you want cross-browser coverage.

    defaults:
      run:
        working-directory: 05-cypress-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 05-cypress-tests/package-lock.json

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          # Tests that require a pre-registered user on demoblaze.com
          # or automationexercise.com cannot run in CI (we have no way
          # to provision those accounts here). They are tagged with
          # itIfAuth(...) in the specs and skipped when this is set.
          CYPRESS_CI_SKIP_AUTH_TESTS: 'true'
        with:
          working-directory: 05-cypress-tests
          browser: ${{ matrix.browser }}
          # npm ci is stricter than npm install — fails fast if the
          # lockfile and package.json drift apart. Right call for CI.
          install-command: npm ci
          # NOTE: Some demoblaze.com test cases require a pre-registered
          # user. If those fail in CI, see PRECONDITION notes in
          # cypress/e2e/demoblaze/login.cy.js — register the user once
          # against the demo site and re-run.

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: 05-cypress-tests/cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-${{ matrix.browser }}
          path: 05-cypress-tests/cypress/reports
          if-no-files-found: ignore
          retention-days: 14
