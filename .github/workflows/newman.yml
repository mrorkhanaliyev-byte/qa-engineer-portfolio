name: Newman API

on:
  push:
    branches: [main]
    paths:
      - '04-postman-api-testing/**'
      - '.github/workflows/newman.yml'
  pull_request:
    branches: [main]
    paths:
      - '04-postman-api-testing/**'
      - '.github/workflows/newman.yml'
  workflow_dispatch:

jobs:
  newman-run:
    name: Newman against AE + restful-booker APIs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 04-postman-api-testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 04-postman-api-testing/package-lock.json

      - name: Install Newman + reporter
        run: npm ci

      - name: Run Automation Exercise collection
        # --env-var CI=true makes the verifyLogin (valid creds) test skip
        # itself if AE's user is not provisioned — same pattern as Cypress.
        run: |
          mkdir -p newman-reports
          npx newman run collections/automation-exercise-api.postman_collection.json \
            -e environments/automation-exercise.postman_environment.json \
            --env-var "CI=true" \
            --reporters cli,htmlextra,junit \
            --reporter-htmlextra-export newman-reports/ae-report.html \
            --reporter-junit-export newman-reports/ae-report.xml \
            --color on

      - name: Run restful-booker collection (full CRUD + auth)
        run: |
          npx newman run collections/restful-booker-api.postman_collection.json \
            -e environments/restful-booker.postman_environment.json \
            --reporters cli,htmlextra,junit \
            --reporter-htmlextra-export newman-reports/booker-report.html \
            --reporter-junit-export newman-reports/booker-report.xml \
            --color on

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-reports
          path: 04-postman-api-testing/newman-reports/*.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JUnit XML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit-reports
          path: 04-postman-api-testing/newman-reports/*.xml
          if-no-files-found: ignore
          retention-days: 14
